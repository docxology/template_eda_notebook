# EDA Notebook Configuration — Exploratory Data Analysis Exemplar
# Demonstrates the computational-notebook archetype: a walkthrough notebook that
# imports a fully-tested EDA library. This file is the configuration source of
# truth for manuscript and publication metadata, loaded by `yaml.safe_load`
# inside `infrastructure/rendering/_pdf_combined_renderer.py`.

# Consumed by: `infrastructure/rendering/pdf_renderer.py` and `infrastructure/reporting/pipeline_report_model.py`
paper:
  # RASP Standard: Title must be descriptive and objective
  title: "Exploratory Data Analysis: A Reproducible Notebook Template"
  subtitle: "Notebook-to-Tested-Source Extraction for Computational Research"
  version: "1.0.0"
  date: ""  # Auto-generated via `infrastructure/validation/output/validator.py` if empty

# Consumed by: `infrastructure.publishing.extract_publication_metadata` (in `infrastructure/publishing/metadata.py`)
authors:
  - name: "Daniel Ari Friedman"
    orcid: "0000-0001-6232-9096"
    email: "daniel@activeinference.institute"
    affiliation: "Active Inference Institute"
    corresponding: true

# Consumed by: `infrastructure.publishing.publish_to_zenodo` (in `infrastructure/publishing/platforms.py`)
publication:
  doi: "10.5281/zenodo.21086292" # Concept DOI — stable citation
  version_doi: "10.5281/zenodo.21086293" # Latest Zenodo deposit
  version_record: "https://zenodo.org/records/21086293"
  github_repository: "docxology/template_eda_notebook"
  published_artifacts:
    ipfs_pinata: "https://gateway.pinata.cloud/ipfs/QmSsHhWo2JC76gQSy6rQuN6uKTP1gH9vtj3kGKLgY5oU4E"
    huggingface_hub: "https://huggingface.co/datasets/ActiveInference/template_eda_notebook"
    osf: "https://osf.io/ycwsk/"
    pypi: "https://test.pypi.org/project/template-eda-notebook/1.0.0/"
    netlify: "https://6a444920f59418acc0357e9f--tranquil-kleicha-0c9203.netlify.app"
    github_pages: "https://docxology.github.io/template_eda_notebook/"
    software_heritage: "https://archive.softwareheritage.org/browse/origin/?origin_url=https://github.com/docxology/template_eda_notebook"
  transmission_bookends:
    enabled: false
    max_prior_releases: 5
    show_steganography: true
  deposit_filename:
    enabled: true
    topic: ""  # optional; default = first significant title word
  journal: ""
  volume: ""
  pages: ""
  year: "2026"

keywords:
  - "exploratory data analysis"
  - "computational notebook"
  - "reproducible research"
  - "pandas"
  - "data cleaning"
  - "correlation analysis"

metadata:
  license: "MIT"
  language: "en"

# Steganography profile (disabled by default for this exemplar).
steganography:
  enabled: false
  overlays_enabled: true
  barcodes_enabled: true
  metadata_enabled: true
  hashing_enabled: true
  encryption_enabled: false
  overlay_mode: "text"
  overlay_text: "CONFIDENTIAL"

# Render format toggles — gate per-renderer in infrastructure/rendering/pipeline.py.
render:
  formats:
    pdf: true
    html: true
    slides: true
    docx: false
    epub: false

# Consumed by: `infrastructure.llm.LLMClient` (in `infrastructure/llm/core/client.py`)
llm:
  reviews:
    enabled: false
    types:
      - executive_summary
  translations:
    enabled: false
    languages:
      - zh

# Consumed by: `infrastructure/reporting/pipeline_report_model.py` and CI/CD gates
testing:
  max_test_failures: 0
  max_infra_test_failures: 0
  max_project_test_failures: 0

# Dataset parameters — the EDA library reads the shipped CSV; these document the
# schema for readers and downstream tooling.
dataset:
  csv_path: "data/measurements.csv"
  id_column: "subject_id"
  group_column: "group"
  numeric_columns:
    - "height_cm"
    - "weight_kg"
    - "resting_hr_bpm"
  histogram_bins: 10
  correlation_top_n: 3
